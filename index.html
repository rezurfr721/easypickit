<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickit Editor for EB2</title>

    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- FileSaver.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- Charger le fichier mods_list.js -->
    <script src="./mods_list.js"></script>

    <!-- Notre CSS -->
    <link rel="stylesheet" href="./styles.css">

    <script type="importmap">
    {
        "imports": {
            "/js/modules/": "./js/modules/",
            "/js/config/": "./js/config/"
        }
    }
    </script>
    <script type="module" src="./js/main.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Pickit Editor</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Règles</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Mods</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Import/Export</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showBetaPickitCreator()">Beta Create Pickit</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="text-center text-warning">Pickit Editor for EB2</h1>
        <div class="card mb-4">
            <div class="card-header">
                <h2>Outils</h2>
            </div>
            <div class="card-body">
                <div class="toolbar-container d-flex flex-wrap">
                    <button class="btn btn-success mr-2" onclick="addRule()">
                        <i class="fas fa-plus"></i> Ajouter une règle
                    </button>
                    <button class="btn btn-secondary mr-2" onclick="showPasteDialog()">
                        <i class="fas fa-paste"></i> Coller une règle
                    </button>
                    <button class="btn btn-warning mr-2" onclick="exportFile()">
                        <i class="fas fa-download"></i> Exporter
                    </button>
                    <div class="file-input-wrapper mr-2">
                        <button class="btn btn-info">
                            <i class="fas fa-upload"></i> Charger un fichier IPD
                        </button>
                        <input type="file" id="fileInput" accept=".ipd">
                    </div>
                    <input type="text" 
                           id="search" 
                           placeholder="Rechercher des règles..." 
                           class="form-control mr-2" 
                           onkeyup="filterRules()">
                    <button class="btn btn-info" onclick="checkRedundancies()">
                        <i class="fas fa-search"></i> Vérifier les redondances
                    </button>
                </div>
            </div>
        </div>

        <!-- Ajout d'une div pour afficher les redondances -->
        <div id="redundanciesContainer" class="mb-4"></div>

        <div class="card">
            <div class="card-header">
                <h2>Règles</h2>
            </div>
            <div class="card-body">
                <table id="rulesTable" class="table table-striped table-dark">
                    <thead class="thead-dark">
                        <tr>
                            <th style="width: 10%">Ligne</th>
                            <th style="width: 45%">Conditions</th>
                            <th style="width: 25%">Action</th>
                            <th style="width: 20%" class="action-column">Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Nouvelle section pour le Beta Create Pickit -->
        <div id="betaPickitCreator" class="card" style="display: none;">
            <div class="card-header">
                <h2>Beta Create Pickit</h2>
            </div>
            <div class="card-body">
                <div id="categoryAccordion">
                    <!-- Les catégories seront injectées ici -->
                </div>
                <div class="mt-3">
                    <button class="btn btn-primary" onclick="generatePickitRules()">
                        <i class="fas fa-magic"></i> Générer les règles
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
